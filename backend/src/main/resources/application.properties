# ===============================
# GLOBAL CONFIGURATION
# ===============================
spring.application.name=tyreplus-dealer-app
server.port=8081

# Virtual Threads (Java 21)
spring.threads.virtual.enabled=true

# JWT Settings
jwt.secret=${JWT_SECRET:tyreplus-dealer-app-secret-key-for-jwt-token-generation-minimum-256-bits-required-for-hmac-sha256}
jwt.expiration=21600000

# Database Connection (Intelligent Placeholders)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:tyreplus_dealer_db}
spring.datasource.username=${DB_USER:tyreplus_user}
spring.datasource.password=${DB_PASSWORD:Tyrebazaar@21}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false
spring.jpa.show-sql=false



# Legacy Path Matcher (Required for SPA routing regex /**/{path:[^\.]*})
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Razorpay Keys
payment.razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_SLwyefy3ooSj9h}
payment.razorpay.key-secret=${RAZORPAY_KEY_SECRET:murrrN1nqzcKWa1lOk8IwAQ0}

# ===============================
# MSG91 WHATSAPP OTP (Active when SPRING_PROFILES_ACTIVE=whatsapp)
# ===============================
# Auth Key — from MSG91 Dashboard → API Keys
msg91.auth-key=${MSG91_AUTH_KEY:}
# Your registered WhatsApp Business number (with country code, no +, e.g. 919876543210)
msg91.integrated-number=${MSG91_INTEGRATED_NUMBER:}
# Approved WhatsApp template name for OTP (e.g. "tyreplus_otp")
msg91.template-name=${MSG91_TEMPLATE_NAME:tyreplus_otp}

# ===============================
# EMAIL (SMTP) — for Forgot Password
# ===============================
# Gmail: use an App Password (not your real password) — Settings → Security → 2FA → App Passwords
# SendGrid: host=smtp.sendgrid.net, port=587, username=apikey, password=YOUR_SENDGRID_API_KEY
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@tyrebazaar.in}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Frontend URL used in reset email link
app.frontend.url=${FRONTEND_URL:http://localhost:3000}